name: Create OCI Instance

on:
  schedule:
    - cron: '*/3 * * * *'
  workflow_dispatch:

jobs:
  create-instance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write OCI config and env
        run: |
          echo "${{ secrets.OCI_API_KEY }}" > oci_key.pem
          chmod 600 oci_key.pem

          cat > oci_config << EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ secrets.OCI_REGION }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          key_file=./oci_key.pem
          EOF

          cat > oci.env << EOF
          OCI_CONFIG=./oci_config
          OCT_FREE_AD=${{ secrets.OCI_AVAILABILITY_DOMAIN }}
          DISPLAY_NAME=my-arm-ubuntu-instance
          OCI_COMPUTE_SHAPE=${{ secrets.OCI_COMPUTE_SHAPE }}
          SECOND_MICRO_INSTANCE=False
          REQUEST_WAIT_TIME_SECS=60
          SSH_AUTHORIZED_KEYS_FILE=./id_rsa.pub
          OCI_SUBNET_ID=${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID=${{ secrets.OCI_IMAGE_ID }}
          OPERATING_SYSTEM=Canonical Ubuntu
          OS_VERSION=22.04
          ASSIGN_PUBLIC_IP=false
          BOOT_VOLUME_SIZE=50
          NOTIFY_EMAIL=False
          EOF

      - name: Run script
        run: python main.py

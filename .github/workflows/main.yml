name: Create OCI Instance

on:
  schedule:
    - cron: '*/3 * * * *'
  workflow_dispatch:

jobs:
  create-instance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write config files
        run: |
          echo "${{ secrets.OCI_API_KEY }}" > oci_api_private_key.pem
          chmod 600 oci_api_private_key.pem

          printf '[DEFAULT]\nuser=%s\nfingerprint=%s\ntenancy=%s\nregion=%s\nkey_file=./oci_api_private_key.pem\n' \
            "${{ secrets.OCI_USER_OCID }}" \
            "${{ secrets.OCI_FINGERPRINT }}" \
            "${{ secrets.OCI_TENANCY_OCID }}" \
            "${{ secrets.OCI_REGION }}" > oci_config

          printf 'OCI_CONFIG=./oci_config\nOCT_FREE_AD=%s\nDISPLAY_NAME=my-arm-ubuntu-instance\nOCI_COMPUTE_SHAPE=%s\nSECOND_MICRO_INSTANCE=False\nREQUEST_WAIT_TIME_SECS=60\nSSH_AUTHORIZED_KEYS_FILE=./id_rsa.pub\nOCI_SUBNET_ID=%s\nOCI_IMAGE_ID=%s\nOPERATING_SYSTEM=Canonical Ubuntu\nOS_VERSION=22.04\nASSIGN_PUBLIC_IP=false\nBOOT_VOLUME_SIZE=50\nNOTIFY_EMAIL=False\n' \
            "${{ secrets.OCI_AVAILABILITY_DOMAIN }}" \
            "${{ secrets.OCI_COMPUTE_SHAPE }}" \
            "${{ secrets.OCI_SUBNET_ID }}" \
            "${{ secrets.OCI_IMAGE_ID }}" > oci.env

      - name: Run script
        run: python main.py
